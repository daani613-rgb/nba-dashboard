<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Engine — Predictions Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@300;400;500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0e14; --panel:#13161f; --panel2:#1a1e29; --line:#222736;
    --ink:#e9ebf2; --muted:#878da0; --faint:#767d97;  /* faint: 4.73:1 — WCAG AA */
    --amber:#f0b429; --amber-dim:#7d5f15;
    --green:#46c08a; --green-d:rgba(70,192,138,.10);
    --red:#e5604d;   --red-d:rgba(229,96,77,.10);
    --blue:#5b8def;
    --t-high:#46c08a; --t-mid:#f0b429; --t-low:#e5604d;
    --serif:'Frank Ruhl Libre','David Libre',Georgia,serif;
    --sans:'Heebo','Arial Hebrew','Noto Sans Hebrew',Arial,sans-serif;
    --mono:'Space Mono','SF Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;
    background-image:radial-gradient(circle at 88% -8%,rgba(240,180,41,.07),transparent 42%),
                     radial-gradient(circle at -5% 105%,rgba(91,141,239,.05),transparent 38%);
    min-height:100vh;padding:26px 16px 64px;
  }
  .wrap{max-width:940px;margin:0 auto}
  header{margin-bottom:22px}
  .head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
  .kicker{font-family:var(--mono);font-size:11px;letter-spacing:2.5px;color:var(--amber);
    text-transform:uppercase;margin-bottom:7px}
  h1{font-family:var(--serif);font-weight:900;font-size:33px;line-height:1.08}
  .sub{color:var(--muted);font-size:13.5px;margin-top:6px;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  .howto-hint{margin-top:9px;background:transparent;border:1px solid var(--line);color:var(--muted);font-size:12.5px;padding:4px 11px;border-radius:7px;cursor:pointer;font-family:inherit}
  .howto-hint:hover{color:var(--ink);border-color:var(--muted)}
  #howto{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:6px 16px;margin-bottom:14px}
  #howto summary{cursor:pointer;font-size:15px;font-weight:600;color:var(--ink);padding:10px 0;list-style:none}
  #howto summary::-webkit-details-marker{display:none}
  #howto summary::before{content:"▸ ";color:var(--muted)}
  #howto[open] summary::before{content:"▾ "}
  .howto-body{display:flex;flex-direction:column;gap:2px;padding:2px 0 12px}
  .howto-h{font-size:14.5px;font-weight:600;color:var(--ink);margin:14px 0 3px}
  .howto-p{font-size:13.5px;color:var(--muted);line-height:1.6;margin:0}
  .howto-note{font-size:13.5px;color:var(--ink);line-height:1.6;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin:9px 0 0}
  .howto-warn{color:#f0a020}
  .tag{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:3px 11px;
    font-size:11px;color:var(--muted);font-family:var(--mono)}
  .fresh{font-family:var(--mono);font-size:12px;border-radius:9px;padding:8px 13px;margin-bottom:18px;
    border:1px solid var(--line)}
  .fresh.ok{color:var(--muted);background:var(--panel)}
  .fresh.stale{color:#ffd27a;background:rgba(240,180,41,.10);border-color:var(--amber-dim)}

  h2{font-family:var(--serif);font-weight:700;font-size:18px;margin:26px 0 12px}
  .section-h{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:26px 0 12px}
  .section-h h2{margin:0}

  .strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 13px}
  .kpi .n{font-family:var(--serif);font-weight:900;font-size:25px;color:var(--ink)}
  .kpi .n small{font-size:14px;color:var(--faint)}
  .kpi .l{font-size:11.5px;color:var(--muted);margin-top:2px}
  .kpi .b{font-size:10px;color:var(--faint);font-family:var(--mono);margin-top:2px}
  .kpi .b:empty{display:none}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .tr-grid{display:grid;grid-template-columns:1.1fr 1.6fr;gap:18px}
  .tr-head{font-size:12px;color:var(--muted);margin-bottom:8px}
  .tr-big{font-family:var(--serif);font-weight:900;font-size:30px}
  .tr-sub{font-size:12px;color:var(--muted)}
  .calib-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:12.5px}
  .calib-row .lab{width:120px;color:var(--muted);font-family:var(--mono);font-size:11px;flex:none}
  .bar{flex:1;height:8px;background:var(--panel2);border-radius:6px;overflow:hidden;position:relative}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--amber-dim),var(--amber));border-radius:6px}
  .calib-row .val{width:110px;text-align:end;flex:none;color:var(--ink)}
  .calib-row .ok{color:var(--green);font-family:var(--mono);font-size:11px}
  .mini-note{font-size:11px;color:var(--faint);margin-top:10px}

  .toggle{display:flex;gap:5px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px}
  .toggle button{background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:12.5px;
    padding:6px 12px;border-radius:7px;cursor:pointer;transition:.16s}
  .toggle button.on{background:var(--amber);color:#1a1407;font-weight:700}
  .lang button{font-family:var(--mono);font-size:12px;padding:6px 10px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:11px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 16px;transition:.16s}
  .card:hover{border-color:#323a52;transform:translateY(-2px)}
  .card .top{display:flex;justify-content:space-between;align-items:center}
  .date{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .outcome{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
  .outcome.ok{color:var(--green);background:var(--green-d)}
  .outcome.no{color:var(--red);background:var(--red-d)}
  .outcome.pend{color:var(--muted);background:var(--panel2)}
  .match{font-family:var(--serif);font-size:18px;font-weight:500;margin:9px 0 1px}
  .match b{font-weight:900}
  .picked{font-size:11.5px;color:var(--muted)}
  .picked .team{color:var(--ink);font-weight:700}
  .score-line{display:flex;align-items:baseline;gap:10px;margin-top:10px;font-family:var(--mono);font-size:12.5px}
  .score-line .sc{color:var(--ink);font-weight:700}
  .score-line .mg{color:var(--faint);font-size:11px}
  .conf-wrap{margin:12px 0 4px}
  .conf-top{display:flex;align-items:baseline;justify-content:space-between}
  .conf-top .v{font-family:var(--serif);font-weight:900;font-size:23px}
  .conf-top .v small{font-size:12px;color:var(--muted);font-weight:400}
  .conf-bar{height:5px;background:var(--panel2);border-radius:4px;margin-top:6px;overflow:hidden}
  .conf-bar i{display:block;height:100%;border-radius:4px}
  /* ===== ברים בסגנון טניס/בייסבול: מנוע מול שוק + value-zone + טוטאל ===== */
  .barwrap{margin:10px 0;direction:ltr}
  .barlabel{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
  .row-label{font-size:11px;font-weight:800;color:var(--muted)}
  .row-sub{font-size:10px;color:var(--faint);font-style:italic}
  .bar{display:flex;height:26px;border-radius:7px;overflow:hidden;font-size:12px;font-weight:700}
  .seg{display:flex;align-items:center;justify-content:center;min-width:0;overflow:hidden;white-space:nowrap;padding:0 4px}
  .seg.pickseg{background:linear-gradient(90deg,#5b8def,#83abf6);color:#0f1115}      /* טקסט כהה — WCAG 1.4.3 (≥4.5:1 בכל הגרדיינט) */
  .seg.oppseg{background:var(--panel2);color:var(--muted)}
  .seg.pickseg.mkt{background:linear-gradient(90deg,#9d63e0,#b06bff);color:#0f1115}
  .seg.oppseg.mkt{background:var(--panel2);color:var(--muted)}
  .axis{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:3px;direction:ltr}
  .axis span{max-width:48%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .vgap{border-radius:9px;padding:8px 11px;font-size:12.5px;margin-top:6px;border:1px solid}
  .vgap .big{font-weight:700}
  .vgap .cap{font-size:11px;color:var(--muted);margin-top:3px}
  .vgap.green{background:rgba(70,192,138,.1);border-color:rgba(70,192,138,.4)} .vgap.green .big{color:var(--t-high)}
  .vgap.teal{background:rgba(125,143,196,.12);border-color:rgba(125,143,196,.4)} .vgap.teal .big{color:#aab8e0}
  .vgap.gray{background:var(--panel2);border-color:var(--line)} .vgap.gray .big{color:var(--muted)}
  /* בר-טוטאל תיאורי (.tbar) — סמן-מנוע תמיד, סמן-קו graceful */
  .barwrap.totals{margin-top:10px}
  .tbar{position:relative;height:30px;background:var(--panel2);border:1px solid var(--line);border-radius:7px;direction:ltr;overflow:hidden}
  .tmark{position:absolute;top:0;height:100%;transform:translateX(-50%)}
  .tmark.line{width:2px;background:#b06bff}
  .tmark.eng{width:3px;background:var(--blue)}
  .taxis{font-size:11.5px;color:var(--muted);margin-top:4px}
  .taxis b{color:var(--ink)}
  .tcap{font-size:10.5px;color:var(--faint);margin-top:4px;font-style:italic}
  .totsec{margin-top:10px;padding-top:8px;border-top:1px dashed var(--line)}
  .totsec .seclbl{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  /* בורר-עדשה לדירוג-היום */
  .lens{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0 8px}
  .lens button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);font-family:inherit;
    font-size:12px;padding:5px 11px;border-radius:8px;cursor:pointer}
  .lens button.on{background:var(--blue);border-color:var(--blue);color:#0f1115;font-weight:700}
  .datepick{display:inline-flex;align-items:center;gap:6px}
  .datepick input{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:8px;
    padding:6px 10px;font-size:12.5px;color-scheme:dark;font-family:inherit}
  /* ניווט-תאריך (chips, מיושר-בייסבול) */
  .chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:6px 0 14px}
  .chips .chip{min-height:38px;padding:7px 15px;border-radius:999px;border:1px solid var(--line);
    background:var(--panel);color:var(--muted);font-family:inherit;font-size:12.5px;cursor:pointer}
  .chips .chip[aria-pressed="true"]{background:var(--amber);color:#1a1407;border-color:var(--amber);font-weight:700}
  .chips input[type=date]{min-height:38px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);color-scheme:dark;font-family:inherit;font-size:12.5px}
  /* בר-ציון (composite — בלי רמות, ממוין לפי ציון) */
  .srow{display:flex;align-items:center;gap:9px;padding:6px 0;border-top:1px solid var(--line);font-size:13px}
  .srow:first-child{border-top:none}
  .srow .snum{width:18px;color:var(--faint);font-size:11px;font-family:var(--mono);flex:0 0 auto;text-align:end}
  .srow .snm{width:46px;flex:0 0 auto;font-weight:600}
  .srow .sbar{flex:1;height:10px;background:var(--panel2);border-radius:5px;overflow:hidden}
  .srow .sbar i{display:block;height:100%;background:linear-gradient(90deg,#3f6fd0,var(--blue));border-radius:5px}
  .srow .sval{width:78px;flex:0 0 auto;text-align:end;font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:8px}
  .badge{display:inline-flex;align-items:center;gap:6px;border-radius:8px;padding:4px 9px;font-size:12px;
    font-weight:500;border:1px solid}
  .badge .num{font-family:var(--mono);font-weight:700}
  .badge.high{color:var(--t-high);border-color:rgba(70,192,138,.4);background:rgba(70,192,138,.08)}
  .badge.mid{color:var(--t-mid);border-color:rgba(240,180,41,.34);background:rgba(240,180,41,.07)}
  .badge.low{color:var(--t-low);border-color:rgba(229,96,77,.34);background:rgba(229,96,77,.07)}
  .cell{font-size:10.5px;color:var(--faint);font-family:var(--mono);text-align:end;line-height:1.35}
  .cell b{color:var(--muted)}

  .note{margin-top:28px;font-size:13px;color:var(--muted)}
  .note h3{font-family:var(--serif);color:var(--ink);font-size:15px;margin-bottom:7px}
  .note code{font-family:var(--mono);background:var(--panel2);padding:2px 7px;border-radius:5px;
    color:var(--amber);font-size:11.5px}
  @media(max-width:580px){.tr-grid{grid-template-columns:1fr}h1{font-size:26px}}
  .empty-state{grid-column:1/-1;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:28px 24px;text-align:center;color:var(--muted);
    font-size:15px;line-height:1.6}

  /* ===== שדרוג: קוביות-דירוג, בר-טוטאל, דגל-הפתעה, מודלים, footer, back-to-top ===== */
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:4px 0 16px}
  .ctl{background:var(--panel2);border:1px solid var(--line);color:var(--ink);font-size:12.5px;
    padding:7px 13px;border-radius:8px;cursor:pointer;font-family:inherit}
  .ctl:hover{border-color:var(--muted)}
  #ranks{display:none;margin:6px 0 4px}
  .cube{background:var(--panel);border:1px solid var(--line);border-radius:13px;margin-bottom:10px;overflow:hidden}
  .cube summary{padding:12px 15px;cursor:pointer;font-weight:600;font-size:14px;list-style:none;
    display:flex;justify-content:space-between;align-items:center}
  .cube summary::-webkit-details-marker{display:none}
  .cube summary .car{color:var(--faint);font-size:18px;transition:transform .2s}
  .cube[open] summary .car{transform:rotate(90deg)}
  .cube .cbody{padding:0 15px 12px}
  .ddtag{display:inline-block;font-size:9.5px;font-weight:700;color:var(--amber);background:rgba(240,180,41,.12);
    border:1px solid rgba(240,180,41,.3);border-radius:5px;padding:1px 6px;margin-inline-start:8px;vertical-align:middle;
    text-transform:uppercase;letter-spacing:.3px}
  .chelp{font-size:11.5px;color:var(--muted);padding:9px 0 2px;line-height:1.5}
  .trow{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.6px;
    padding:9px 0 3px;border-top:1px solid var(--line);font-weight:700;margin-top:4px}
  .tier{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid var(--line);font-size:13px}
  .trow + .tier{border-top:none}
  .tdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .t1{background:var(--green)}.t2{background:#46c9bb}.t3{background:var(--amber)}.t4{background:#e0894e}.t5{background:var(--red)}
  .tname{flex:1}.tval{color:var(--muted);font-size:12px;font-family:var(--mono)}
  .tlabel{font-size:10.5px;color:var(--faint);min-width:70px;text-align:end}
  /* בר מנוע/שוק/טוטאל */
  .barlbl{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin:10px 0 4px}
  .bar2{height:24px;border-radius:7px;overflow:hidden;display:flex;font-size:12px;font-weight:700}
  .bar2 .seg{display:flex;align-items:center;justify-content:center;color:#0f1115;white-space:nowrap}
  .bar2.eng .seg:first-child{background:var(--blue)} .bar2.eng .seg:last-child{background:var(--panel2);color:var(--muted)}
  .bar2.tot .seg:first-child{background:var(--green);color:#eafff6} .bar2.tot .seg:last-child{background:var(--panel2);color:var(--muted)}
  .gapline{font-size:11.5px;margin-top:8px;padding:6px 9px;border-radius:7px;display:flex;justify-content:space-between;align-items:center}
  .gapline.green{background:var(--green-d);color:var(--green);border:1px solid rgba(70,192,138,.3)}
  .gapline.teal{background:rgba(31,156,143,.12);color:#46c9bb;border:1px solid rgba(31,156,143,.3)}
  .gapline.gray{background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
  .flag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--amber);
    background:rgba(240,180,41,.10);border:1px solid rgba(240,180,41,.32);padding:4px 9px;border-radius:6px;margin-top:9px}
  .honest{font-size:10.5px;color:var(--faint);margin-top:7px;font-style:italic;line-height:1.4}
  /* modals */
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;padding:20px;overflow-y:auto}
  .modal.open{display:flex;align-items:flex-start;justify-content:center}
  .modal .box{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:560px;width:100%;
    padding:22px;margin:auto;position:relative}
  .modal .x{position:absolute;top:12px;inset-inline-end:14px;background:none;border:none;color:var(--muted);
    font-size:26px;cursor:pointer;line-height:1}
  .modal h3{font-family:var(--serif);font-size:19px;margin-bottom:14px}
  .modal h4{font-size:14px;margin:16px 0 5px;color:var(--blue);font-family:var(--serif)}
  .modal p{font-size:13px;color:#cdd6e0;margin-bottom:8px;line-height:1.6}
  .modal .num{color:var(--faint);font-weight:700;margin-inline-end:6px;font-family:var(--mono)}
  .modal a{color:var(--blue)}
  .demo{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px;margin:8px 0;font-size:12.5px;color:var(--muted)}
  footer{margin-top:30px;padding-top:16px;border-top:1px solid var(--line);font-size:11.5px;color:var(--faint);
    text-align:center;line-height:1.8}
  footer .age{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:5px;
    padding:1px 7px;margin-inline-end:6px;font-weight:700;color:var(--muted)}
  footer button{background:none;border:none;color:var(--blue);cursor:pointer;font-size:11.5px;text-decoration:underline;font-family:inherit}
  #toTop{position:fixed;inset-block-end:18px;inset-inline-end:18px;z-index:50;background:var(--panel2);
    border:1px solid var(--line);color:var(--ink);width:44px;height:44px;border-radius:50%;cursor:pointer;
    font-size:18px;display:none;align-items:center;justify-content:center}
  #toTop.show{display:flex}

  /* ===== נגישות WCAG 2.1/2.2 AA ===== */
  /* 2.4.7 פוקוס-נראה — outline ברור על כל אינטראקטיבי */
  a:focus-visible, button:focus-visible, summary:focus-visible, input:focus-visible,
  [tabindex]:focus-visible, .chip:focus-visible, .ctl:focus-visible{
    outline:3px solid var(--amber); outline-offset:2px; border-radius:6px;
  }
  summary:focus-visible{outline-offset:-2px}
  /* 2.5.8 גודל-יעד — מינימום בטוח לכל הכפתורים הקטנים */
  .lang button, .toggle button, .ctl, .x{min-height:32px}
  /* 2.3.3 prefers-reduced-motion — מבטל אנימציות/מעברים כשמבוקש */
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{animation-duration:.001ms !important; animation-iteration-count:1 !important;
      transition-duration:.001ms !important; scroll-behavior:auto !important}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="head-row">
      <div>
        <div class="kicker">NBA PREDICTION ENGINE · ELO + 9 STAGES</div>
        <h1 data-i18n="h1"></h1>
      </div>
      <div class="toggle lang">
        <button data-lang="en" class="on">EN</button>
        <button data-lang="he">עב</button>

    howtoKpi:`The five boxes at the top summarize how the engine did when tested on seasons it never trained on — fixed historical results, not today's games. One detail kept out of the boxes to keep them short: the "85% on the strongest calls vs 65% otherwise" comparison is measured only within confident calls (≥70%) — the fair, like-for-like comparison.`,
    howto2Title:"Confidence and A+",
    howto2:`The win chance is how likely the engine thinks the pick is to win — basketball has no draw, so it's just two outcomes: this team or the other. A pick at 80% means the engine expects it to win about 4 times out of 5. "A+" marks the highest-confidence calls (the engine's strongest zone). High confidence is not certainty — even an 80% pick loses about 1 time in 5.`,
    howto3Title:"Calibration",
    howto3:`Calibration asks a simple question: when the engine says 80%, does the thing actually happen about 80% of the time? The bars at the top of the page compare what the engine predicted against what really happened, across test seasons it never trained on. When the two line up, the percentages mean what they say — that's what separates a reliable engine from a guess.`,
    howto4Title:"The fatigue tag — 'bad schedule spot'",
    howto4:`Some cards carry a "bad schedule spot" tag. It appears when the favorite is playing its second game on consecutive nights (a back-to-back) and that second game involves moving between cities — either heading out on the road or coming back home — while the underdog is rested. Why it matters: a tired team that traveled tends to play a little worse, so the upset chance rises — from a base of about 36% up to around 46% in the sharpest case (the favorite heading out on the road). Amber marks that sharpest spot; a muted tag marks the milder one (the return trip home). This is a verified historical finding — stable across 9 of the last 12 seasons — and it will start tagging live games when the new season begins.`,
    howto5Title:"The caveat",
    howto5:`The fatigue tag is a bias flag, not a prediction. It does not say the favorite will lose — it only says the upset chance is higher than usual. The favorite still wins most of the time. And like the rest of the engine, this was tested against historical results and naive logic, not against bookmaker lines — it's an edge in reading the game, not a promise of easy money.`,
    noteH:"How it goes live",
    noteBody:`Every number is real, measured on 15,428 games — but historical. For live predictions the engine runs on your machine: <code>python fetch_current_season.py</code> then <code>python run_daily.py</code>, which writes the day's predictions straight to the board. Each percent label is the real accuracy measured for that confidence × stage cell; a cell with too small a sample shows "small sample" instead of a number.`,

    howtoDecided:"כל משחק שקראנו ושהסתיים נשאר כאן לכל אורך העונה — המפגש עם המנצח מודגש, הניבוי שלנו (✓ אם צדקנו), הסקור הסופי, וההפרש. הרשומה נבנית ככל שהעונה מתקדמת ולא מתאפסת עד העונה הבאה.",

    howAccTitle:"איך לקרוא את הדף",
    howto1Title:"מה הדף מראה",
    howto1:`כל משחק NBA של היום מופיע כאן ככרטיס, ממוין לפי כמה המנוע בטוח — הבטוח ביותר למעלה. כל כרטיס מראה את הבחירה של המנוע ואת סיכוי הניצחון. הדף מציג את כל המשחקים, לא רק את החזקים; פס הביטחון הוא מה שמבדיל ביניהם.`,
    howtoKpiTitle:"המספרים בראש הדף (הקוביות)",
    howtoKpi:`חמש הקוביות בראש הדף מסכמות איך המנוע הצליח כשנבדק על עונות שלא התאמן עליהן — תוצאות היסטוריות קבועות, לא משחקי היום. פרט אחד שהושאר מחוץ לקוביות כדי לשמור עליהן קצרות: ההשוואה "85% בקריאות החזקות מול 65% ברגיל" נמדדת רק בתוך קריאות בטוחות (ביטחון ≥70%) — ההשוואה ההוגנת.`,
    howto2Title:"ביטחון ו-A+",
    howto2:`סיכוי הניצחון הוא כמה המנוע מעריך שהבחירה תנצח — בכדורסל אין תיקו, אז יש רק שתי תוצאות: הקבוצה הזו או השנייה. בחירה ב-80% אומרת שהמנוע מצפה שהיא תנצח בערך 4 פעמים מתוך 5. "A+" מסמן את הקריאות עם הביטחון הגבוה ביותר (האזור החזק של המנוע). ביטחון גבוה הוא לא ודאות — גם בחירה של 80% מפסידה בערך פעם אחת מכל 5.`,
    howto3Title:"כיול",
    howto3:`כיול שואל שאלה פשוטה: כשהמנוע אומר 80%, האם הדבר באמת קורה בערך 80% מהפעמים? הפסים בראש הדף משווים את מה שהמנוע ניבא מול מה שבאמת קרה, על פני עונות-מבחן שהוא מעולם לא התאמן עליהן. כשהשניים מתיישרים, האחוזים אומרים מה שהם אומרים — וזה מה שמבדיל מנוע אמין מניחוש.`,
    howto4Title:"תווית העייפות — 'עמדת-לוח רעה'",
    howto4:`חלק מהכרטיסים נושאים תווית "עמדת-לוח רעה". היא מופיעה כשהפייבוריט משחק את המשחק השני שלו בלילות רצופים (back-to-back), והמשחק השני כרוך במעבר בין ערים — בין אם יציאה לדרכים ובין אם חזרה הביתה — בעוד שהמאאוטסיידר רענן. למה זה משנה: קבוצה עייפה שנסעה נוטה לשחק קצת פחות טוב, אז סיכוי ההפתעה עולה — מבסיס של בערך 36% לכיוון 46% במקרה החריף ביותר (הפייבוריט יוצא לדרכים). אמבר מסמן את העמדה החריפה הזו; תווית עמומה מסמנת את המתונה יותר (חזרה הביתה). זהו ממצא היסטורי מאומת — יציב ב-9 מתוך 12 העונות האחרונות — והוא יתחיל לסמן משחקים חיים כשהעונה החדשה תיפתח.`,
    howto5Title:"הסייג",
    howto5:`תווית העייפות היא דגל הטיה, לא נבואה. היא לא אומרת שהפייבוריט יפסיד — היא רק אומרת שסיכוי ההפתעה גבוה מהרגיל. הפייבוריט עדיין מנצח רוב הזמן. וכמו שאר המנוע, זה נבדק מול תוצאות היסטוריות והיגיון נאיבי, לא מול קווי מהמרים — זה יתרון בקריאת המשחק, לא הבטחה לכסף קל.`,

// ⚠️ off-by-one: ISO מרכיבים-מקומיים (לא toISOString שהוא UTC — הלקח מהמונדיאל)
function toLocalISO(d){ const p=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()); }
function addDays(iso, n){ const d=new Date(iso+"T12:00:00"); d.setDate(d.getDate()+n); return toLocalISO(d); }
function todayISO(){ return toLocalISO(new Date()); }

function fmtDate(s){ const p=String(s).split("-"); if(p.length!==3) return s;
  return (LANG==="he") ? p[2]+"."+p[1] : p[1]+"."+p[2]; }   // he DD.MM · en MM.DD
function tier(s){ if([6,8,9].includes(s)) return "high"; if([2,3,5,7].includes(s)) return "mid"; return "low"; }
// P(over) מהמנוע: נורמל(totalEng, σ) מול קו-השוק (אותה לוגיקה כמו nba_market_math.total_to_prob_over)
function pOverJS(totalEng, line, sigma){
  const erf=x=>{const s=x<0?-1:1; x=Math.abs(x); const tt=1/(1+0.3275911*x);
    const y=1-(((((1.061405429*tt-1.453152027)*tt)+1.421413741)*tt-0.284496736)*tt+0.254829592)*tt*Math.exp(-x*x);
    return s*y;};
  const z=(line-totalEng)/((sigma||18.8)*Math.SQRT2);
  return 1-0.5*(1+erf(z));   // P(over)
}
// בר דו-צדדי (over/under או pick/opp) — דפוס segBar של בייסבול. mkt=סגנון-שוק.
function segBar(label, sub, leftPct, leftLbl, rightLbl, mkt){

  return `<div class="barwrap"><div class="barlabel"><span class="row-label">${label}</span>`+

    `<div class="bar"><span class="seg pickseg${mkt?' mkt':''}" style="flex:0 0 ${l}%">${l>=16?leftLbl+' '+l+'%':''}</span>`+
    `<span class="seg oppseg${mkt?' mkt':''}" style="flex:1">${r>=16?rightLbl+' '+r+'%':''}</span></div></div>`;
}

// composite_today ב-JS — אותו כיול בדיוק כמו nba_composite_score.py (מ-CUBES.normRanges)
function _normJS(v, lo, hi, floor){ if(v==null) return floor;
  let x=(v-lo)/(hi-lo)*100; x=Math.max(0,Math.min(100,x)); return Math.max(floor,x); }
function compositeTodayJS(pWin, elo, mom){
  const R=CUBES.normRanges||{eloLo:1200,eloHi:1800,momLo:-80,momHi:80,floor:10};
  const p=Math.max(R.floor,Math.min(100,pWin));
  const e=_normJS(elo,R.eloLo,R.eloHi,R.floor), m=_normJS(mom,R.momLo,R.momHi,R.floor);
  const wp=0.45,we=0.25,wm=0.30,s=wp+we+wm;
  return Math.round((Math.pow(p,wp/s)*Math.pow(e,we/s)*Math.pow(m,wm/s))*10)/10;
}

  let html="", lastG=null;
  arr.forEach(x=>{
    const g = groupFn ? groupFn(x) : null;
    if(g!==null && g!==lastG){ html+=`<div class="trow">${g}</div>`; lastG=g; }
    const lab = labelFn ? `<span class="tlabel">${labelFn(x)}</span>` : "";
    html+=`<div class="tier"><span class="tdot t${dotFn(x)}"></span><span class="tname">${x.team}</span>${lab}<span class="tval">${valFn(x)}</span></div>`;
  });
  return html;
}
// PICKS שתואמים לתאריך-הנבחר (date-nav). offseason/ריק → []
// משחקי התאריך-הנבחר בפורמט אחיד {home,away,pick,prob,road,totalEng} — היום מ-PICKS, עבר מ-HISTORY.
function dayGames(){
  if(!curDate || curDate===todayISO()){
    return (typeof PICKS!=="undefined"?PICKS:[]).map(p=>({home:p.home,away:p.away,pick:p.pick,
      prob:p.prob, road:p.road, totalEng:p.totalEng}));
  }
  return (typeof HISTORY!=="undefined"?HISTORY:[]).filter(d=>d.date===curDate).map(d=>({
    home:d.home, away:d.away, pick:d.pick, prob:d.prob, road:(d.pick!==d.home), totalEng:null}));
}
function renderCubes(){
  const box=document.getElementById("ranks");
  if(typeof CUBES==="undefined" || !CUBES){ box.innerHTML=""; return; }
  const dg = dayGames();
  const eloMap={}, momMap={};
  CUBES.elo.forEach(x=>eloMap[x.team]=x.elo); CUBES.momentum.forEach(x=>momMap[x.team]=x.mom);
  const empty = `<p class="chelp" style="color:var(--faint)">${t("noGamesDate")}</p>`;
  let html="";
  // 1-3 — דירוגים יומיים: תמיד מופיעים במיקומם, תווית תלוי-תאריך, empty-state כשאין משחקים.
  // 1 · teams_today (לפי הסתברות)
  const tt = dg.map(p=>({team:`${p.pick} (${p.road?"@":"vs"} ${p.pick===p.home?p.away:p.home})`,
    prob:p.prob, tier:p.prob>=80?1:p.prob>=70?2:p.prob>=60?3:4})).sort((a,b)=>b.prob-a.prob);
  html += cubeWrap("teamsToday", true, tt.length?tierRows(tt, x=>x.prob+"%", x=>x.tier, null, null):empty, true);
  // 2 · games (לפי ביטחון + טוטאל-צפוי)
  const tg = dg.map(p=>({team:`${p.home} vs ${p.away}`, prob:p.prob,
    tier:p.prob>=80?1:p.prob>=70?2:p.prob>=60?3:4,
    lab:(p.prob>=80?"A+ · ":"")+(p.totalEng!=null?("tot "+p.totalEng):"")})).sort((a,b)=>b.prob-a.prob);
  html += cubeWrap("games", false, tg.length?tierRows(tg, x=>x.prob+"%", x=>x.tier, x=>x.lab, null):empty, true);
  // 3 · composite_today (p_win+Elo+מומנטום) — מתמלא גם לתאריך-עבר (Elo/מומנטום = snapshot נוכחי)
  const ct = dg.map(p=>({team:`${p.pick} (${p.road?"@":"vs"} ${p.pick===p.home?p.away:p.home})`,
    score:compositeTodayJS(p.prob, eloMap[p.pick]??1500, momMap[p.pick]??0), p:p.prob}))
    .sort((a,b)=>b.score-a.score);
  html += cubeWrap("compToday", false, ct.length?scoreBarRows(ct, x=>`${x.score} · p${x.p}%`, x=>x.score):empty, true);
  // 4 · composite_overall (Elo+מומנטום) — בר-ציון, ממוין. קבוצה-בעלייה עוקפת דועכת.
  html += cubeWrap("composite", false, scoreBarRows(CUBES.composite,
    x=>`${x.score} · Elo ${x.elo} · m${x.mom>=0?'+':''}${x.mom}`, x=>x.score));
  // 5 · elo_power (league, מקובץ-רמות)
  html += cubeWrap("elo", false, tierRows(CUBES.elo, x=>x.elo, x=>x.tier+1, null, x=>x.tierName));
  // 6 · totals (league, לפי net)
  const tl = CUBES.totals.map((x,i)=>({team:x.team, net:x.net, off:x.off, def:x.def,
    tier:i<6?1:i<12?2:i<18?3:i<24?4:5}));
  html += cubeWrap("totals", false, tierRows(tl,
    x=>(x.net>0?"+":"")+x.net, x=>x.tier, x=>`off ${x.off} · def ${x.def}`, null));
  // 7 · momentum (league, מקובץ-רמות)
  html += cubeWrap("momentum", false, tierRows(CUBES.momentum,
    x=>(x.mom>0?"+":"")+x.mom, x=>x.tier+1, null, x=>x.tierName));
  box.innerHTML = html;
}

function applyLang(){
  document.documentElement.lang = LANG;
  document.documentElement.dir = (LANG==="he") ? "rtl" : "ltr";
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{ el.innerHTML = t(el.dataset.i18nHtml); });
  document.querySelectorAll(".lang button").forEach(b=> b.classList.toggle("on", b.dataset.lang===LANG));
  const _tt=document.getElementById("toTop"); if(_tt) _tt.setAttribute("aria-label", t("backToTop"));  // 1.1.1 דו-לשוני
  renderFresh(); renderCalib(); renderTrack(); render(currentFilter); renderNext(); renderDecided(); renderCubes();
}

// 2.3.3 prefers-reduced-motion — גלילה חלקה רק כשלא-מבוקש-צמצום-תנועה
function scrollBehavior(){
  return (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) ? "auto" : "smooth";
}
function openHowto(){
  var d = document.getElementById("howto");
  if(d){ d.open = true; d.scrollIntoView({behavior:scrollBehavior(), block:"start"}); }
}

document.querySelectorAll(".lang button").forEach(b=>{
  b.onclick=()=>{ LANG=b.dataset.lang; applyLang(); };
});
document.querySelectorAll(".toggle:not(.lang) button").forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll(".toggle:not(.lang) button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); render(b.dataset.f); };
});

// ---- שדרוג: קוביות-toggle + מודלים + back-to-top ----
(function(){
  const ranksBtn=document.getElementById("ranksBtn"), ranks=document.getElementById("ranks");
  if(ranksBtn) ranksBtn.onclick=function(){
    const open=ranks.style.display==="block";
    ranks.style.display=open?"none":"block";
    this.setAttribute("aria-expanded", String(!open));
  };
  function openModal(id){const m=document.getElementById(id); if(m){m.classList.add("open");document.body.style.overflow="hidden";}}
  function closeModals(){document.querySelectorAll(".modal").forEach(m=>m.classList.remove("open"));document.body.style.overflow="";}
  const gb=document.getElementById("guideBtn"); if(gb) gb.onclick=()=>openModal("guideModal");
  const db=document.getElementById("discBtn"); if(db) db.onclick=()=>openModal("discModal");
  const db2=document.getElementById("discBtn2"); if(db2) db2.onclick=()=>openModal("discModal");
  document.querySelectorAll("[data-close]").forEach(b=>b.onclick=closeModals);
  document.querySelectorAll(".modal").forEach(m=>m.onclick=e=>{if(e.target===m)closeModals();});
  document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModals();});
  const toTop=document.getElementById("toTop");
  if(toTop){
    toTop.onclick=()=>window.scrollTo({top:0,behavior:scrollBehavior()});
    window.addEventListener("scroll",()=>{toTop.classList.toggle("show", window.scrollY>300);});
  }
  // ניווט-תאריך (chips: אתמול/היום/מחר/לפי-תאריך) — מנווט את ה-#grid + הקוביות-היומיות.
  const dpk=document.getElementById("datePicker");
  document.querySelectorAll("#dateChips .chip").forEach(c=>c.addEventListener("click",()=>{
    setView(c.dataset.d);
  }));
  if(dpk) dpk.addEventListener("change",()=>{ if(dpk.value){ curDate=dpk.value; dateView="bydate"; refreshDate(); } });
})();

function setView(view){
  dateView=view;
  const dpk=document.getElementById("datePicker");
  if(view==="today")        curDate="";
  else if(view==="yesterday") curDate=addDays(todayISO(),-1);
  else if(view==="tomorrow")  curDate=addDays(todayISO(),+1);
  else if(view==="bydate")  { dpk.style.display="inline-block"; if(!dpk.value){ dpk.value=todayISO(); } curDate=dpk.value; }
  if(view!=="bydate" && dpk) dpk.style.display="none";
  refreshDate();
}
function refreshDate(){
  document.querySelectorAll("#dateChips .chip").forEach(c=>
    c.setAttribute("aria-pressed", String(c.dataset.d===dateView)));
  render(currentFilter); renderCubes();
}

applyLang();
</script>
